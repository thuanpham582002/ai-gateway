# This is valid: multiple InferencePool backends with weights and session affinity
# for canary/A-B testing with consistent routing for the same session

apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: inference-pool-weighted-affinity
  namespace: default
spec:
  parentRefs:
    - name: some-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: llama3-8b
      backendRefs:
        - name: vllm-llama3-8b-v1
          group: inference.networking.k8s.io
          kind: InferencePool
          weight: 80
        - name: vllm-llama3-8b-v2
          group: inference.networking.k8s.io
          kind: InferencePool
          weight: 20
      sessionAffinity:
        hashOn:
          - type: Header
            name: X-Session-ID
          - type: RequestBody
            jsonPath: "$.user"
        fallback: WeightedRandom
