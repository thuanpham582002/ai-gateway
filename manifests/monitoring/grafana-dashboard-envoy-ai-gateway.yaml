apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-envoy-ai-gateway
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboard-envoy-ai-gateway
data:
  envoy-ai-gateway.json: |
    {
      "id": null,
      "uid": "envoy-ai-gateway-full",
      "title": "Envoy AI Gateway - Full Observability",
      "tags": [
        "envoy",
        "ai-gateway",
        "genai",
        "kafka",
        "production"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 3,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus",
              "selected": true
            }
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(up{job=\"envoy-gateway-system/envoy-ai-gateway-extproc\"}, namespace)",
            "refresh": 1,
            "current": {
              "text": "envoy-gateway-system",
              "value": "envoy-gateway-system",
              "selected": true
            }
          },
          {
            "name": "controller_namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(up{job=\"ai-gateway-controller\"}, namespace)",
            "refresh": 1,
            "current": {
              "text": "envoy-ai-gateway-system",
              "value": "envoy-ai-gateway-system",
              "selected": true
            }
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(up{job=\"envoy-gateway-system/envoy-ai-gateway-extproc\",namespace=\"$namespace\"}, pod)",
            "refresh": 1,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all",
              "selected": true
            }
          },
          {
            "name": "operation",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(gen_ai_server_request_duration_seconds_count{namespace=\"$namespace\"}, gen_ai_operation_name)",
            "refresh": 1,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all",
              "selected": true
            }
          },
          {
            "name": "model",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(gen_ai_server_request_duration_seconds_count{namespace=\"$namespace\"}, gen_ai_request_model)",
            "refresh": 1,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all",
              "selected": true
            }
          },
          {
            "name": "kafka_topic",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(ai_gateway_kafka_events_attempted_total{namespace=\"$namespace\"}, kafka_topic)",
            "refresh": 1,
            "includeAll": true,
            "allValue": ".*",
            "current": {
              "text": "All",
              "value": "$__all",
              "selected": true
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Health / Scrape",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "ExtProc targets up",
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum(up{job=\"envoy-gateway-system/envoy-ai-gateway-extproc\",namespace=\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Envoy proxy targets up",
          "description": "",
          "gridPos": {
            "x": 6,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum(up{job=\"envoy-gateway-system/envoy-ai-gateway-proxy\",namespace=\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Controller targets up",
          "description": "",
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum(up{job=\"ai-gateway-controller\",namespace=\"$controller_namespace\"})",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Kafka producer failures",
          "description": "",
          "gridPos": {
            "x": 18,
            "y": 1,
            "w": 6,
            "h": 4
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum(ai_gateway_kafka_events_failed_total{namespace=\"$namespace\",pod=~\"$pod\"}) or vector(0)",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "GenAI Traffic",
          "gridPos": {
            "x": 0,
            "y": 5,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Request rate by operation/model",
          "description": "Requests that reached AI Gateway extproc and completed response processing.",
          "gridPos": {
            "x": 0,
            "y": 6,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (gen_ai_operation_name, gen_ai_request_model) (rate(gen_ai_server_request_duration_seconds_count{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m]))",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 8,
          "type": "barchart",
          "title": "Request volume by operation/model",
          "description": "",
          "gridPos": {
            "x": 12,
            "y": 6,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (gen_ai_operation_name, gen_ai_request_model) (increase(gen_ai_server_request_duration_seconds_count{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[$__range]))",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Request errors by type",
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 13,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (error_type, gen_ai_operation_name, gen_ai_request_model) (rate(gen_ai_server_request_errors_total{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m]))",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "eps"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Error ratio",
          "description": "",
          "gridPos": {
            "x": 12,
            "y": 13,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum(rate(gen_ai_server_request_errors_total{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m])) / sum(rate(gen_ai_server_request_duration_seconds_count{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m]))",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 11,
          "type": "row",
          "title": "GenAI Latency",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Request latency p50/p95/p99",
          "description": "",
          "gridPos": {
            "x": 0,
            "y": 21,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, gen_ai_operation_name, gen_ai_request_model) (rate(gen_ai_server_request_duration_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m])))",
              "legendFormat": "p50 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, gen_ai_operation_name, gen_ai_request_model) (rate(gen_ai_server_request_duration_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m])))",
              "legendFormat": "p95 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, gen_ai_operation_name, gen_ai_request_model) (rate(gen_ai_server_request_duration_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m])))",
              "legendFormat": "p99 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Request latency avg",
          "description": "",
          "gridPos": {
            "x": 12,
            "y": 21,
            "w": 6,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (gen_ai_operation_name, gen_ai_request_model) (rate(gen_ai_server_request_duration_seconds_sum{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m])) / sum by (gen_ai_operation_name, gen_ai_request_model) (rate(gen_ai_server_request_duration_seconds_count{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[5m]))",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "In-flight downstream requests",
          "description": "",
          "gridPos": {
            "x": 18,
            "y": 21,
            "w": 6,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (pod) (envoy_http_downstream_rq_active{namespace=\"$namespace\",pod=~\"$pod\",envoy_http_conn_manager_prefix=\"http-10080\"})",
              "legendFormat": "",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "TTFT p50/p95/p99 (streaming only)",
          "description": "Streaming only. Uses increase over the selected dashboard time range so low-QPS traffic is visible; send stream=true requests to populate.",
          "gridPos": {
            "x": 0,
            "y": 28,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, gen_ai_operation_name, gen_ai_request_model) (increase(gen_ai_server_time_to_first_token_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[$__range])))",
              "legendFormat": "p50 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, gen_ai_operation_name, gen_ai_request_model) (increase(gen_ai_server_time_to_first_token_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[$__range])))",
              "legendFormat": "p95 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, gen_ai_operation_name, gen_ai_request_model) (increase(gen_ai_server_time_to_first_token_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[$__range])))",
              "legendFormat": "p99 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Time per output token p50/p95/p99 (streaming only)",
          "description": "Streaming only. Uses increase over the selected dashboard time range. Requires cumulative output token counts at end of stream.",
          "gridPos": {
            "x": 12,
            "y": 28,
            "w": 12,
            "h": 7
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, gen_ai_operation_name, gen_ai_request_model) (increase(gen_ai_server_time_per_output_token_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[$__range])))",
              "legendFormat": "p50 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, gen_ai_operation_name, gen_ai_request_model) (increase(gen_ai_server_time_per_output_token_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[$__range])))",
              "legendFormat": "p95 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, gen_ai_operation_name, gen_ai_request_model) (increase(gen_ai_server_time_per_output_token_seconds_bucket{namespace=\"$namespace\",pod=~\"$pod\",gen_ai_operation_name=~\"$operation\",gen_ai_request_model=~\"$model\"}[$__range])))",
              "legendFormat": "p99 {{gen_ai_operation_name}} / {{gen_ai_request_model}}",
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": {
