apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-ai-gateway-proxy-to-otel-collector
  namespace: monitoring
spec:
  from:
  - group: gateway.envoyproxy.io
    kind: EnvoyProxy
    namespace: envoy-ai-gateway-system
  to:
  - group: ""
    kind: Service
    name: otel-collector
